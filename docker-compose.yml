# docker-compose للتطوير المحلي — IBP
# يشغّل: postgres + redis + api (NestJS) + web (Next.js).
# للبنية التحتية فقط:  docker compose up -d postgres redis
# للحزمة كاملةً:        docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: ibp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ibp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-ibp_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ibp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ibp} -d ${POSTGRES_DB:-ibp_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ibp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ibp_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ibp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ibp}:${POSTGRES_PASSWORD:-change_me_local_only}@postgres:5432/${POSTGRES_DB:-ibp_dev}?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ibp-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      PORT: ${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  ibp_pgdata:
  ibp_redisdata:
