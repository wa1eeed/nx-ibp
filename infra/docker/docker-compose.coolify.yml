# ============================================================================
# IBP — حزمة إنتاج لنشر Coolify (Docker Compose)
# ----------------------------------------------------------------------------
# الاستخدام: في Coolify ⇒ مشروع جديد ⇒ "Docker Compose" ⇒ أشِر لهذا الملف،
# ثم اضبط متغيّرات البيئة (القائمة في infra/docker/coolify.md) واربط الدومينات.
# الهجرات تُطبَّق تلقائيًا عند إقلاع الـ API (prisma migrate deploy عبر docker-entrypoint.sh).
# الأسرار المطلوبة تُفشل النشر فورًا إن لم تُضبط (لا قيم افتراضية ضعيفة).
# ⚠️ سيادة البيانات: لا تُنشر بيانات إنتاج حقيقية خارج المملكة (PDPL/هيئة التأمين) — انظر docs/30 §4.
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ibp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD مطلوب}
      POSTGRES_DB: ${POSTGRES_DB:-ibp}
    volumes:
      - ibp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ibp} -d ${POSTGRES_DB:-ibp}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ibp_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      # السياق = جذر المستودع (Coolify يشغّل compose بـ project-directory = الجذر)
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ——— الأساسيات (مطلوبة) ———
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ibp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ibp}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET مطلوب}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS مطلوب (دومين الواجهة)}
      ZATCA_ENC_KEY: ${ZATCA_ENC_KEY:?ZATCA_ENC_KEY مطلوب (base64 32 بايت)}
      ZATCA_DEFAULT_ENV: ${ZATCA_DEFAULT_ENV:-SANDBOX}
      STORAGE_LOCAL_DIR: /data/storage # مرفقات على الـ volume الدائم (السائق local افتراضيًا في الكود)
      # ——— البذرة + سوبر أدمن (لأمر seed:demo/seed:prod/admin:set من طرفية الحاوية) ———
      SEED_MODE: ${SEED_MODE:-}
      # بذرة آلية عند الإقلاع (بعد الهجرات): اضبط SEED_ON_START=demo (staging) أو =production، أعد النشر مرّة، ثم أزِلها.
      SEED_ON_START: ${SEED_ON_START:-}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-}
      PLATFORM_ADMIN_NAME: ${PLATFORM_ADMIN_NAME:-}
      # ——— اختيارية: حُذفت لأنّ لها قيم افتراضية آمنة في الكود (Sandbox/local) — فلا تُثقِل قائمة
      #     المتغيّرات في Coolify. **للإنتاج**، أضِف ما تحتاجه منها **هنا** بصيغة تمرير البيئة، ثم اضبط قيمته:
      #     NOTIFY_GATEWAY=live + TAQNYAT_*/RESEND_* · BILLING_GATEWAY=tap + TAP_* ·
      #     STORAGE_DRIVER=s3|r2 + STORAGE_ENDPOINT/REGION/BUCKET/ACCESS_KEY/SECRET_KEY/FORCE_PATH_STYLE ·
      #     JWT_EXPIRES_IN · LOGIN_MAX_FAILURES · LOGIN_LOCK_WINDOW_SEC · PRESIGNED_URL_EXPIRY_SECONDS ·
      #     APP_PUBLIC_URL · API_PUBLIC_URL — انظر .env.example.
    volumes:
      - ibp_storage:/data/storage # التخزين المحلي الدائم
    expose:
      - "4000" # Coolify يوجّه دومين الـ API لهذا المنفذ
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s # مهلة الإقلاع + تطبيق الهجرات

  web:
    build:
      # السياق = جذر المستودع (Coolify يشغّل compose بـ project-directory = الجذر)
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL يُدمَج في حزمة العميل وقت البناء — لا بدّ من تمريره build arg (لا runtime فقط)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL مطلوب (دومين الـ API العام)}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      # ملاحظة: NEXT_PUBLIC_API_URL يُمرَّر build arg فقط (يُدمَج وقت البناء) — لا يُكرَّر هنا وقت التشغيل.
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000" # Coolify يوجّه الدومين الرئيسي لهذا المنفذ
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ibp_pgdata:
  ibp_redisdata:
  ibp_storage:
