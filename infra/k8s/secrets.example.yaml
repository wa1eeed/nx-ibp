# قالب الأسرار — لا تُودِع القيم الحقيقية في Git. تُحقن من مدير أسرار
# (AWS Secrets Manager / GCP Secret Manager / Alibaba KMS) عبر External Secrets أو CSI.
# أنشئ Secret فعلياً بـ: kubectl create secret generic ibp-api-secrets --from-env-file=.env.prod -n ibp
apiVersion: v1
kind: Secret
metadata:
  name: ibp-api-secrets
  namespace: ibp
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/ibp?schema=public&sslmode=require"
  REDIS_URL: "rediss://HOST:6379"
  JWT_SECRET: "REPLACE_WITH_STRONG_SECRET"
  STORAGE_ENDPOINT: "https://s3.REGION.amazonaws.com"
  STORAGE_BUCKET: "ibp-prod-docs"
  STORAGE_ACCESS_KEY: "REPLACE"
  STORAGE_SECRET_KEY: "REPLACE"
